<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inferise · Downloads</title>
<meta name="description" content="The Inferise software download site.">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="any">
<style>
  :root {
    --bg:        #1a0c02;
    --bg-soft:   #251304;
    --haze:      #3a1c06;
    --ink:       #ffffff;
    --ink-dim:   #d8b9a0;
    --line:      #43210a;
    --accent:    #ff6a00;
    --accent-2:  #ff8c2e;
    --display:   "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --body:      ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --mono:      ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: var(--body);
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    min-height: 100%;
    position: relative;
    overflow-x: hidden;
  }

  /* ── ambient smoke / haze: the one signature flourish ─────────────── */
  .haze {
    position: fixed;
    inset: -20% -20% auto -20%;
    height: 90vh;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(40% 50% at 30% 20%, rgba(255,106,0,0.14), transparent 70%),
      radial-gradient(45% 55% at 75% 35%, rgba(255,140,46,0.12), transparent 70%),
      radial-gradient(50% 60% at 50% 60%, rgba(58,28,6,0.55), transparent 75%);
    filter: blur(20px);
    animation: drift 26s ease-in-out infinite alternate;
  }
  @keyframes drift {
    0%   { transform: translate3d(-3%, -2%, 0) scale(1.05); opacity: 0.85; }
    50%  { transform: translate3d(2%, 1%, 0)  scale(1.12); opacity: 1; }
    100% { transform: translate3d(4%, -1%, 0) scale(1.08); opacity: 0.9; }
  }

  main {
    position: relative;
    z-index: 1;
    flex: 1;
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    padding: clamp(2rem, 8vh, 6rem) 1.5rem 2rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .eyebrow {
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.4rem;
  }

  h1 {
    font-family: var(--display);
    font-weight: 500;
    font-size: clamp(2rem, 6vw, 3.1rem);
    line-height: 1.08;
    letter-spacing: -0.02em;
    margin-bottom: 1.1rem;
  }
  h1 .accent {
    background: linear-gradient(100deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .lede {
    color: var(--ink-dim);
    font-size: 1.02rem;
    line-height: 1.6;
    max-width: 46ch;
    margin-bottom: 3rem;
  }

  /* ── item list ─────────────────────────────────────────────────── */
  .items {
    border-top: 1px solid var(--line);
  }
  .item {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    padding: 1.25rem 0;
    border-bottom: 1px solid var(--line);
    text-decoration: none;
    color: var(--ink);
    transition: padding-left 0.2s ease, color 0.2s ease;
  }
  .item:hover,
  .item:focus-visible {
    padding-left: 0.6rem;
    color: var(--accent);
    outline: none;
  }
  .item .name {
    font-family: var(--display);
    font-weight: 500;
    font-size: 1.15rem;
    letter-spacing: -0.01em;
    flex: 0 0 auto;
  }
  .item .desc {
    color: var(--ink-dim);
    font-size: 0.9rem;
    flex: 1;
  }
  .item:hover .desc,
  .item:focus-visible .desc { color: var(--ink-dim); }
  .item .arrow {
    font-family: var(--mono);
    color: var(--ink-dim);
    transition: transform 0.2s ease, color 0.2s ease;
  }
  .item:hover .arrow,
  .item:focus-visible .arrow {
    transform: translateX(4px);
    color: var(--accent);
  }

  footer {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    width: 100%;
    padding: 1.5rem;
    color: var(--ink-dim);
    font-size: 0.78rem;
    font-family: var(--mono);
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  footer a { color: var(--ink-dim); text-decoration: none; }
  footer a:hover, footer a:focus-visible { color: var(--accent); }

  @media (prefers-reduced-motion: reduce) {
    .haze { animation: none; }
  }
</style>
</head>
<body>
  <div class="haze" aria-hidden="true"></div>

  <main>
    <p class="eyebrow">WebSiteMCP</p>
    <h1>Inferise <span class="accent">WebSiteMCP Specification</span></h1>
    <p class="lede">WebSiteMCP Specification.</p>

    <nav class="items" aria-label="READ">
      <a class="item" href="https://github.com/inferise/websitemcp">
        <span class="name">Repository</span>
        <span class="desc">Repository for WebSiteMCP.</span>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>
      <a class="item" href="https://websitemcp.inferise.com/domain/com/svb/www/manifest.json">
        <span class="name">Sample Organization Manifest</span>
        <span class="desc">Sample Organization Manifest.</span>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>
      <a class="item" href="https://websitemcp.inferise.com/contract/banking@1.0.json">
        <span class="name">Sample Agent Contract</span>
        <span class="desc">Sample Agent Contract.</span>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>
      <a class="item" href="https://websitemcp.inferise.com/domain/com/svb/www/banking@1.0.json">
        <span class="name">Sample Orchestrator Binding</span>
        <span class="desc">Sample Orchestrator Binding.</span>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>
    </nav>
  </main>

  <footer>
    <span>Inferise Inc.</span>
    <a href="https://www.inferise.com">Home</a>
  </footer>
</body>
</html>
